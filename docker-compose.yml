# Local "running constantly" stack for the trader.
#
# Default services (always up):
#   - dashboard: Streamlit UI on http://localhost:8501. Reads data/journal.db
#                in real-time (auto-refresh every 30s in the UI). Auto-restarts
#                if it crashes. THIS is the right thing to leave running.
#
# Opt-in services (commented out — uncomment to enable):
#   - cron-daily: runs scripts/run_daily.py at 21:10 UTC Mon-Fri inside a
#                 long-lived container. ONLY enable if you want the trading
#                 cron to live on your laptop instead of GitHub Actions.
#                 Most people: leave commented out. The strategy doesn't
#                 trade more often just because you run it locally; you'd
#                 just be duplicating GitHub Actions cron + creating a
#                 split-brain reconciliation problem.
#   - cron-intraday: same idea for the intraday-risk-watch.
#
# Quickstart:
#   docker compose up -d           # starts dashboard in background
#   open http://localhost:8501
#   docker compose logs -f dashboard
#   docker compose down            # stop everything
#
# To rebuild after code changes:
#   docker compose build dashboard
#   docker compose up -d --force-recreate dashboard

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: trader-dashboard:latest
    container_name: trader-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      # Bind-mount data/ so the dashboard sees the SAME journal that the
      # local Docker runs + GitHub-artifact-pulled journal write to.
      - ./data:/app/data
      # Mount the .env file read-only — needed for the GitHub-sync button
      # to authenticate, and for the regime-overlay tab if you want it to
      # use real broker creds (it doesn't trade).
      - ./.env:/app/.env:ro
      # v3.50.2: bind-mount host gh CLI config so the "Pull latest journal
      # artifact" button can auth as the host user. Read-only so the
      # container can never modify host credentials.
      - ${HOME}/.config/gh:/home/trader/.config/gh:ro
    environment:
      # GH_TOKEN env-var auth as a fallback if the config mount is missing.
      # Sourced from the host shell where docker compose is invoked.
      - GH_TOKEN=${GH_TOKEN-}
      # Default: regime overlay computes for observability but isn't applied.
      # The dashboard tab shows the live multiplier either way.
      - REGIME_OVERLAY_ENABLED=false
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8501/_stcore/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ============================================================
  # OPT-IN: local cron emulator. Uncomment to run the trader on your laptop
  # instead of (or in parallel with) GitHub Actions. See header comment for
  # why this is usually NOT what you want.
