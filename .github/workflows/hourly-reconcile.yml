name: trader-hourly-reconcile

# Hourly reconciliation between Alpaca and journal during US market hours.
# v3.17d: paper-trade reconcile-once-daily was a known live-go-live blocker —
# corporate actions / partial fills can drift the journal silently for up to
# 24h. This catches drift within ~60 minutes.
#
# Schedule: 14:00, 15:00, ..., 20:00 UTC Mon-Fri
# (market hours: 13:30-20:00 UTC = 9:30-16:00 ET during DST).
#
# Sends email ONLY on drift detection — not on every successful reconcile,
# to avoid hourly spam.

on:
  schedule:
    # Every hour at :00 from 14:00 to 20:00 UTC (= 10am-4pm ET DST), Mon-Fri
    - cron: "0 14-20 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: trader-hourly-reconcile
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore journal from latest trader-journal artifact (any workflow)
        # v3.46 fix: also pulls from backfill-journal.yml uploads, not just
        # trader-daily-run history.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data/
          ARTIFACT_ID=$(gh api "repos/$GITHUB_REPOSITORY/actions/artifacts?name=trader-journal&per_page=10" \
                       --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].id // empty')
          if [ -n "$ARTIFACT_ID" ] && [ "$ARTIFACT_ID" != "null" ]; then
            ARTIFACT_RUN=$(gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$ARTIFACT_ID" --jq '.workflow_run.id // empty')
            gh run download "$ARTIFACT_RUN" -n trader-journal -D data/ -R "$GITHUB_REPOSITORY" 2>&1 || echo "no journal artifact"
          else
            echo "no trader-journal artifact found"
          fi
        continue-on-error: true

      - name: Run reconcile
        id: recon
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER: "true"
          # NO SMTP env on regular runs — only set if we need to alert
        run: |
          set +e
          python scripts/run_reconcile.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          set -e

      - name: Alert on drift
        if: steps.recon.outputs.exit_code == '2'
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: richard.chen.1989@gmail.com
          EMAIL_FROM: ${{ secrets.SMTP_USER }}
        run: |
          python scripts/notify_cli.py \
            --subject "trader: hourly reconcile detected drift between Alpaca and journal" \
            --body "Hourly reconcile (run-id: ${{ github.run_id }}) flagged a mismatch. Check the workflow log at: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}. Common causes: corporate action (split/dividend), partial fill, ticker change. Run scripts/run_reconcile.py locally for full diagnostic."

      - name: Fail loudly on hard error
        if: steps.recon.outputs.exit_code != '0' && steps.recon.outputs.exit_code != '2'
        run: |
          echo "Reconcile exited with code ${{ steps.recon.outputs.exit_code }} — non-drift error"
          exit ${{ steps.recon.outputs.exit_code }}
