name: trader-daily-run

# Runs Mon-Fri at 21:10 UTC (= 1:10pm PT during DST, 2:10pm PT outside DST)
# This replaces the laptop-dependent Claude scheduled task.
# Journal SQLite persists between runs via GitHub Actions artifacts.

on:
  schedule:
    # 21:10 UTC = 1:10pm PT (DST). Adjust seasonally if needed.
    - cron: "10 21 * * 1-5"
  workflow_dispatch:  # manual trigger button in GitHub UI

permissions:
  contents: read
  actions: write  # for artifact upload

concurrency:
  group: trader-daily-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore journal from latest trader-journal artifact (any workflow)
        # v3.46 fix: previously this only looked at trader-daily-run history. But
        # backfill-journal.yml also uploads trader-journal artifacts (used to
        # heal reconcile drift). Need to find the LATEST artifact named
        # trader-journal across ALL workflows. Use the artifacts API directly.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data/
          # List all non-expired artifacts named trader-journal, sorted newest first
          ARTIFACT_ID=$(gh api "repos/$GITHUB_REPOSITORY/actions/artifacts?name=trader-journal&per_page=10" \
                       --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].id // empty')
          if [ -n "$ARTIFACT_ID" ] && [ "$ARTIFACT_ID" != "null" ]; then
            ARTIFACT_RUN=$(gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$ARTIFACT_ID" --jq '.workflow_run.id // empty')
            ARTIFACT_WORKFLOW=$(gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$ARTIFACT_ID" --jq '.workflow_run.head_branch + " (run " + (.workflow_run.id|tostring) + ")"')
            echo "Restoring journal from artifact $ARTIFACT_ID (run $ARTIFACT_WORKFLOW)"
            gh run download "$ARTIFACT_RUN" -n trader-journal -D data/ -R "$GITHUB_REPOSITORY" 2>&1 || echo "download failed; starting fresh"
          else
            echo "no trader-journal artifact found; starting fresh"
          fi
          ls -la data/ || true
        continue-on-error: true  # first run / missing artifact starts fresh

      - name: Run daily orchestrator
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER: "true"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: richard.chen.1989@gmail.com
          EMAIL_FROM: ${{ secrets.SMTP_USER }}
          USE_DEBATE: "true"
          DRY_RUN: "false"
        run: python scripts/run_daily.py --force

      - name: Save journal for next run
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trader-journal
          path: data/journal.db
          retention-days: 90
          overwrite: true
