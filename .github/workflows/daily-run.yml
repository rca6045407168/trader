name: trader-daily-run

# Runs Mon-Fri at 21:10 UTC (= 1:10pm PT during DST, 2:10pm PT outside DST)
# This replaces the laptop-dependent Claude scheduled task.
# Journal SQLite persists between runs via GitHub Actions artifacts.

on:
  schedule:
    # 21:10 UTC = 1:10pm PT (DST). Adjust seasonally if needed.
    - cron: "10 21 * * 1-5"
  workflow_dispatch:  # manual trigger button in GitHub UI

permissions:
  contents: read
  actions: write  # for artifact upload

concurrency:
  group: trader-daily-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore journal from previous run
        uses: actions/download-artifact@v4
        with:
          name: trader-journal
          path: data/
        continue-on-error: true  # first run won't have an artifact yet

      - name: Run daily orchestrator
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER: "true"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: richard.chen.1989@gmail.com
          EMAIL_FROM: ${{ secrets.SMTP_USER }}
          USE_DEBATE: "true"
          DRY_RUN: "false"
        run: python scripts/run_daily.py --force

      - name: Save journal for next run
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trader-journal
          path: data/journal.db
          retention-days: 90
          overwrite: true
