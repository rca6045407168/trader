name: trader-weekly-digest

# Sunday 5pm PT (00:00 UTC Monday). Reviews the past 5 trading days,
# computes rolling Sharpe / drawdown / sleeve attribution, surfaces drift.

on:
  schedule:
    - cron: "0 0 * * 1"  # 00:00 UTC Monday = 5pm Sunday PT (DST)
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: trader-weekly-digest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore journal
        uses: actions/download-artifact@v4
        with:
          name: trader-journal
          path: data/
        continue-on-error: true

      - name: Generate weekly digest
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER: "true"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: richard.chen.1989@gmail.com
          EMAIL_FROM: ${{ secrets.SMTP_USER }}
        run: python scripts/weekly_digest.py
