name: trader-perf-digest

# Runs Mon-Fri at 21:38 UTC (= 1:38pm PT). After daily-run completes.
# Emails the day's P&L, positions, and alpha vs SPY.

on:
  schedule:
    - cron: "38 21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  actions: read  # to download artifact

concurrency:
  group: trader-perf-digest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore journal
        uses: actions/download-artifact@v4
        with:
          name: trader-journal
          path: data/
        continue-on-error: true

      - name: Generate + email perf digest
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER: "true"
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: richard.chen.1989@gmail.com
          EMAIL_FROM: ${{ secrets.SMTP_USER }}
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'src')
          from trader.execute import get_client
          from trader.data import fetch_history
          from trader.journal import recent_snapshots
          from trader.notify import notify
          from datetime import datetime
          import pandas as pd

          c = get_client()
          acct = c.get_account()
          positions = c.get_all_positions()

          equity = float(acct.equity)
          cash = float(acct.cash)
          deployed = sum(float(p.market_value) for p in positions)

          start_eq = 100_000
          cum_pnl = equity - start_eq
          cum_pct = cum_pnl / start_eq

          snaps = recent_snapshots(days=7)
          if len(snaps) >= 2:
              yest = snaps[1]['equity'] or start_eq
              day_pnl = equity - yest
              day_pct = day_pnl / yest
          else:
              day_pnl = 0
              day_pct = 0

          try:
              spy = fetch_history(['SPY'], start=(datetime.now() - pd.Timedelta(days=10)).strftime('%Y-%m-%d'))['SPY']
              spy_today = (float(spy.iloc[-1]) - float(spy.iloc[-2])) / float(spy.iloc[-2])
          except Exception:
              spy_today = None

          pos_lines = []
          for p in sorted(positions, key=lambda x: -float(x.market_value)):
              pl = float(p.unrealized_pl)
              plpc = float(p.unrealized_plpc) * 100
              pos_lines.append(f'{p.symbol}: \${float(p.market_value):,.0f}  P&L \${pl:+.2f} ({plpc:+.2f}%)')

          alpha_str = f' alpha {(day_pct - spy_today)*100:+.2f}%' if spy_today is not None else ''
          spy_str = f', SPY {spy_today*100:+.2f}%' if spy_today is not None else ''

          body = f'''Equity: \${equity:,.2f}  Cash: \${cash:,.2f}  Deployed: \${deployed:,.2f}
          Day P&L: \${day_pnl:+,.2f} ({day_pct*100:+.2f}%){spy_str}{alpha_str}
          Total P&L since start: \${cum_pnl:+,.2f} ({cum_pct*100:+.2f}%)

          Positions:
          ''' + '\\n'.join('  ' + l for l in pos_lines)

          subject = f'Day perf: {day_pct*100:+.2f}%{alpha_str}'
          notify(body, subject=subject)
          "
